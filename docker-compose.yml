version: '3.8'

services:


  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  ms1-comptes:
    build: ./ms1-comptes
    container_name: ms1-comptes
    ports:
      - "50051:50051"
    environment:
      - PROTO_PATH=/proto
    volumes:
      - ./proto:/proto
      - ms1-data:/app/data
    depends_on:
      kafka:
        condition: service_healthy

  ms2-transactions:
    build: ./ms2-transactions
    container_name: ms2-transactions
    ports:
      - "50052:50052"
    environment:
      - KAFKA_BROKER=kafka:9092
      - MS1_HOST=ms1-comptes
      - PROTO_PATH=/proto
    volumes:
      - ./proto:/proto
      - ms2-data:/app/data
    depends_on:
      kafka:
        condition: service_healthy
      ms1-comptes:
        condition: service_started

  ms3-historique:
    build: ./ms3-historique
    container_name: ms3-historique
    ports:
      - "50053:50053"
    environment:
      - KAFKA_BROKER=kafka:9092
      - PROTO_PATH=/proto
    volumes:
      - ./proto:/proto
    depends_on:
      kafka:
        condition: service_healthy

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "3000:3000"
    environment:
      - PROTO_PATH=/proto
      - MS1_HOST=ms1-comptes
      - MS2_HOST=ms2-transactions
      - MS3_HOST=ms3-historique
    volumes:
      - ./proto:/proto
    depends_on:
      - ms1-comptes
      - ms2-transactions
      - ms3-historique
volumes:
  ms1-data:
  ms2-data: